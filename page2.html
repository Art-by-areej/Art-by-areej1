<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store</title>

<style>

/* 🔝 HEADER ثابت */
.header {
    position: fixed;
    top: 0;
    width: 100%;
    background: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px;
    border-bottom: 1px solid #eee;
    z-index: 1000;
}

/* مسافة تحت الهيدر */
body {
    margin: 0;
    padding-top: 70px;
    font-family: sans-serif;
}

/* زر السلة */
.cart-icon {
    cursor: pointer;
    font-size: 20px;
}

/* 🛍️ المنتجات */
.catalog {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    padding: 10px;
}

.product {
    border: 1px solid #eee;
    border-radius: 12px;
    padding: 10px;
    text-align: center;
}

.product img {
    width: 100%;
    border-radius: 10px;
}

button {
    margin-top: 8px;
    padding: 8px;
    border: none;
    background: #6b4f3b;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div>☰</div>
    <div>متجري</div>
    <div class="cart-icon" onclick="goToCart()">🛒</div>
</div>

<!-- PRODUCTS -->
<div class="catalog">

    <div class="product">
        <img src="https://via.placeholder.com/150">
        <h3>برواز 1</h3>
        <p>50₪</p>
        <button onclick="addToCart('برواز 1', 50)">أضف للسلة</button>
    </div>

   <div class="product">
            <img src="تصميم صوره باركودa3.jpg" alt="تصميم صورة بباركود اغنية ">
            <h3>تصميم صورة بباركود اغنية   </h3>
            <p>  حجم A3  </p>
            <P>60₪</P>
            <button onclick="addToCart(' 1 تصميم صورة A3بباركود اغنية ', 60)">أضف إلى السلة</button>
        </div>



</div>

<script>

/* 🛒 إضافة للسلة */
function addToCart(name, price) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    cart.push({ name, price });

    localStorage.setItem("cart", JSON.stringify(cart));

    alert("تمت الإضافة للسلة ✔️");
}

/* فتح صفحة السلة */
function goToCart() {
    window.location.href = "cart.html";
}

</script>

</body>
</html>
